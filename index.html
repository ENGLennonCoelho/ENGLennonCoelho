<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Lennon Coelho Chaves | Portfólio</title>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<style>

/* RESET */
* {
    box-sizing: border-box;
}

/* BASE MOBILE FIRST */
body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
    background: #f8fafc;
    color: #0f172a;
    margin: 0;
    padding: 0;
    line-height: 1.6;
}

/* CONTAINER */
.container {
    width: 100%;
    max-width: 900px;
    margin: auto;
    padding: 20px 15px;
}

/* HEADER */
.header {
    text-align: center;
    margin-bottom: 25px;
}

.header h1 {
    font-size: 24px;
    margin-bottom: 8px;
}

.header p {
    font-size: 14px;
    color: #64748b;
}

/* CARD */
.card {
    background: #ffffff;
    padding: 18px;
    margin-bottom: 18px;
    border-radius: 12px;
    box-shadow: 0 3px 10px rgba(0,0,0,0.06);
}

/* TITULOS */
h1 { font-size: 22px; }
h2 { font-size: 18px; margin-top: 0; }
h3 { font-size: 16px; }

/* TEXTO */
p, li {
    font-size: 14px;
}

/* LISTAS */
li {
    margin: 6px 0;
}

/* LINKS */
a {
    color: #2563eb;
    text-decoration: none;
}

a:hover {
    text-decoration: underline;
}

/* BADGES */
p img {
    max-width: 100%;
    height: auto;
    margin: 4px 2px;
}

/* IMAGENS */
img {
    max-width: 100%;
    height: auto;
}

/* ANIMAÇÃO LEVE */
.card {
    opacity: 0;
    transform: translateY(15px);
    animation: fadeUp 0.5s ease forwards;
}

@keyframes fadeUp {
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

/* RESPONSIVO TABLET */
@media (min-width: 600px) {

    .container {
        padding: 30px 20px;
    }

    .header h1 {
        font-size: 30px;
    }

    .header p {
        font-size: 16px;
    }

    h1 { font-size: 26px; }
    h2 { font-size: 22px; }
    h3 { font-size: 18px; }

    p, li {
        font-size: 15px;
    }

    .card {
        padding: 22px;
    }
}

/* RESPONSIVO DESKTOP */
@media (min-width: 1024px) {

    .header h1 {
        font-size: 36px;
    }

    .container {
        padding: 40px;
    }

    .card {
        padding: 28px;
    }
}

</style>
</head>

<body>

<div class="container">

    <div class="header">
        <h1>👨‍💻 Lennon Coelho Chaves</h1>
        <p>Data | Automação | Projetos | Melhoria Contínua</p>
    </div>

    <div id="content"></div>

</div>

<script>
fetch("README.md")
  .then(response => response.text())
  .then(text => {
    let html = marked.parse(text);

    const sections = html.split("<h2");
    let finalHTML = "";

    sections.forEach((sec, index) => {
        if(index === 0){
            finalHTML += `<div class="card">${sec}</div>`;
        } else {
            finalHTML += `<div class="card"><h2${sec}</div>`;
        }
    });

    document.getElementById("content").innerHTML = finalHTML;
  });
</script>

</body>
</html>
